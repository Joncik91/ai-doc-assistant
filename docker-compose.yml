version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - LLM_PROVIDER=deepseek
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=deepseek-chat
      - LLM_TEMPERATURE=0.5
      - LLM_MAX_TOKENS=2000
      - CHROMA_PERSIST_DIRECTORY=/data/chroma
      - DOCUMENT_STORAGE_DIRECTORY=/data/documents
      - DATABASE_URL=sqlite:////data/app.db
      - BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME:-admin}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-admin}
      - BOOTSTRAP_API_KEY=${BOOTSTRAP_API_KEY:-dev-api-key-change-in-production}
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - chroma
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - app-network
    depends_on:
      - backend

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=true
    volumes:
      - ./data/chroma:/chroma/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data:
